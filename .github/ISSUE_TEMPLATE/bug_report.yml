name: 缺陷反馈
description: 报告插件、后端或项目工作流中的异常行为
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供可复现的信息，这会帮助我们更快定位原因。
  - type: dropdown
    id: area
    attributes:
      label: 问题范围
      description: 请选择最接近的模块
      options:
        - VS Code 插件端
        - Vue Webview 前端
        - Python 后端
        - Ollama / 模型接入
        - 文档或示例
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到了什么问题
      placeholder: 例如：点击“项目级修改方案”后没有出现 diff 预览
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序描述如何复现
      placeholder: |
        1. 打开示例文件
        2. 启动插件开发宿主
        3. 在侧边栏输入...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 我原本期望看到什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 使用版本
      description: 可以填写提交哈希、分支名或本地时间点
      placeholder: 例如 main / 07fc129
  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 可以贴调试控制台日志、终端输出或截图
      render: shell

name: 功能建议
description: 提出新的 Agent 能力、交互改进或工程化增强
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出新想法。请尽量说明使用场景和预期收益，帮助我们判断优先级。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 先说清楚当前哪里不够好
      placeholder: 例如：项目级修改方案只能返回单文件动作，多文件文档联动还不稳定
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 描述你希望项目支持什么能力
      placeholder: 例如：支持先检索多个文件，再生成可部分勾选应用的 diff 方案
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 说明这个功能在什么情况下有价值
      placeholder: 例如：用于毕业设计演示，展示 Agent 能够改动代码与文档
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 如果你考虑过其他做法，也欢迎补充
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经阅读 README，确认这个需求不是现有能力的重复描述
        - label: 我已经尽量说明使用场景和预期收益
